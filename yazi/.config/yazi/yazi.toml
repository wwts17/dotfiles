[mgr]
show_hidden    = true
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
ratio          = [1, 4, 3]
scrolloff      = 5
mouse_events   = ["click", "scroll"]

[preview]
max_width   = 1000
max_height  = 1000
image_delay = 30
tab_size    = 2

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
play = [
  { run = 'iina "$@"', orphan = true, for = "macos" },
]
open = [
  { run = 'open "$@"', desc = "Finder open", for = "macos" },
]

[open]
prepend_rules = [
  { url = "*.md", use = "edit" },
  { mime = "video/*", use = "play" },
]

[tasks]
micro_workers = 10
macro_workers = 25
